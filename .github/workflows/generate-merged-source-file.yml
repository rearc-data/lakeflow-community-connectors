name: Generate Merged Source File
# This is needed because SDP does not support module imports for Python Data Source implementations.

on:
  pull_request:
    paths:
      - 'src/databricks/labs/community_connector/sources/**/*.py'
      - 'src/databricks/labs/community_connector/libs/utils.py'
      - 'src/databricks/labs/community_connector/interface/lakeflow_connect.py'
      - 'src/databricks/labs/community_connector/sparkpds/lakeflow_datasource.py'
      - '!src/databricks/labs/community_connector/sources/**/test/**'
  push:
    branches:
      - master
    paths:
      - 'src/databricks/labs/community_connector/sources/**/*.py'
      - 'src/databricks/labs/community_connector/libs/utils.py'
      - 'src/databricks/labs/community_connector/interface/lakeflow_connect.py'
      - 'src/databricks/labs/community_connector/sparkpds/lakeflow_datasource.py'
      - '!src/databricks/labs/community_connector/sources/**/test/**'

permissions:
  contents: read

jobs:
  generate-merged-sources:
    runs-on:
      group: databrickslabs-protected-runner-group
      labels: linux-ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # Need full history so the diff between base and head SHAs is
          # reachable (the default shallow clone does not include the base).
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.10'

      - name: Compute changed files
        id: changed-files
        env:
          # Route github.event values through env to prevent expression
          # interpolation directly into the run block. Same defense-in-depth
          # pattern used elsewhere in this repo.
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PUSH_AFTER_SHA: ${{ github.event.after }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            BASE_SHA="$PR_BASE_SHA"
            HEAD_SHA="$PR_HEAD_SHA"
          else
            BASE_SHA="$PUSH_BEFORE_SHA"
            HEAD_SHA="$PUSH_AFTER_SHA"
          fi

          # Handle initial commit or force push where BASE_SHA is unreachable.
          if ! git cat-file -e "$BASE_SHA" 2>/dev/null; then
            BASE_SHA=$(git rev-parse HEAD~1 2>/dev/null || echo "")
          fi

          if [ -z "$BASE_SHA" ]; then
            DIFF=$(git ls-files)
          else
            DIFF=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          fi

          # Mirror the path filters previously enforced by
          # tj-actions/changed-files: source/library/interface/registration .py
          # files, excluding generated outputs and test directories.
          all_changed=$(echo "$DIFF" | grep -E '^src/databricks/labs/community_connector/(sources/.+\.py|libs/utils\.py|interface/lakeflow_connect\.py|sparkpds/lakeflow_datasource\.py)$' \
              | grep -vE '/sources/.*/_generated_.*\.py$' \
              | grep -vE '/sources/.*/test/' || true)

          all_generated=$(echo "$DIFF" | grep -E '^src/databricks/labs/community_connector/sources/.*/_generated_.*\.py$' || true)

          # Multi-line outputs use the heredoc form per GitHub Actions docs.
          {
            echo "all_changed_files<<EOF"
            echo "$all_changed"
            echo "EOF"
            echo "all_changed_generated<<EOF"
            echo "$all_generated"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "Source files changed:"
          echo "$all_changed"
          echo "Generated files changed:"
          echo "$all_generated"

      - name: Determine sources to regenerate
        id: sources
        env:
          # Read step outputs via env to prevent shell injection from filenames
          # chosen by PR authors (e.g. `foo;evil.py`).
          ALL_CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
          ALL_CHANGED_GENERATED: ${{ steps.changed-files.outputs.all_changed_generated }}
        run: |
          SOURCES_TO_REGENERATE=""
          SOURCES_DIR="src/databricks/labs/community_connector/sources"

          # Check if shared files changed (affects all sources)
          SHARED_CHANGED="false"
          for file in $ALL_CHANGED_FILES; do
            if [[ "$file" == "src/databricks/labs/community_connector/libs/utils.py" ]] || \
               [[ "$file" == "src/databricks/labs/community_connector/interface/lakeflow_connect.py" ]] || \
               [[ "$file" == "src/databricks/labs/community_connector/sparkpds/lakeflow_datasource.py" ]]; then
              SHARED_CHANGED="true"
              break
            fi
          done
          
          if [[ "$SHARED_CHANGED" == "true" ]]; then
            # Regenerate all sources that have a main source file
            for dir in ${SOURCES_DIR}/*/; do
              source_name=$(basename "$dir")
              # Skip interface directory and check if main source file exists
              if [[ "$source_name" != "interface" ]] && [[ -f "${SOURCES_DIR}/${source_name}/${source_name}.py" ]]; then
                SOURCES_TO_REGENERATE="$SOURCES_TO_REGENERATE $source_name"
              fi
            done
          else
            # Check sources whose source files changed
            for file in $ALL_CHANGED_FILES; do
              if [[ "$file" == ${SOURCES_DIR}/*/[!_]*.py ]]; then
                # Extract source name from path like src/databricks/labs/community_connector/sources/zendesk/zendesk.py
                source_name=$(basename "$(dirname "$file")")
                # Check if main source file exists and it's not interface
                if [[ "$source_name" != "interface" ]] && [[ -f "${SOURCES_DIR}/${source_name}/${source_name}.py" ]]; then
                  # Add to list if not already present
                  if [[ ! " $SOURCES_TO_REGENERATE " =~ " $source_name " ]]; then
                    SOURCES_TO_REGENERATE="$SOURCES_TO_REGENERATE $source_name"
                  fi
                fi
              fi
            done
            
            # Also check sources whose generated files changed
            for file in $ALL_CHANGED_GENERATED; do
              # Extract source name from path like src/databricks/labs/community_connector/sources/zendesk/_generated_zendesk_python_source.py
              source_name=$(basename "$(dirname "$file")")
              # Check if main source file exists and it's not interface
              if [[ "$source_name" != "interface" ]] && [[ -f "${SOURCES_DIR}/${source_name}/${source_name}.py" ]]; then
                # Add to list if not already present
                if [[ ! " $SOURCES_TO_REGENERATE " =~ " $source_name " ]]; then
                  SOURCES_TO_REGENERATE="$SOURCES_TO_REGENERATE $source_name"
                fi
              fi
            done
          fi
          
          # Trim leading/trailing whitespace
          SOURCES_TO_REGENERATE=$(echo "$SOURCES_TO_REGENERATE" | xargs)
          echo "sources=$SOURCES_TO_REGENERATE" >> $GITHUB_OUTPUT
          echo "Sources to regenerate: $SOURCES_TO_REGENERATE"

      - name: Regenerate merged source files
        if: steps.sources.outputs.sources != ''
        env:
          # Read step output via env to prevent shell injection; the sources
          # value is transitively derived from PR-author-controlled filenames.
          SOURCES: ${{ steps.sources.outputs.sources }}
        run: |
          for source_name in $SOURCES; do
            echo "Regenerating merged source for: $source_name"
            python tools/scripts/merge_python_source.py "$source_name"
          done

      - name: Check if generated files are up to date
        if: steps.sources.outputs.sources != ''
        env:
          # Read step output via env to prevent shell injection; see note above.
          SOURCES: ${{ steps.sources.outputs.sources }}
        run: |
          SOURCES_DIR="src/databricks/labs/community_connector/sources"
          # Check if there are any differences between the regenerated files and what's in the repo
          if git diff --quiet ${SOURCES_DIR}/**/_generated_*.py 2>/dev/null; then
            echo "✅ Generated source files are up to date. No changes needed."
            exit 0
          else
            echo "❌ Generated source files are out of date!"
            echo ""
            echo "The following files need to be regenerated:"
            git diff --name-only ${SOURCES_DIR}/**/_generated_*.py
            echo ""
            echo "Please run the following commands locally and commit the changes:"
            echo ""
            for source_name in $SOURCES; do
              echo "  python tools/scripts/merge_python_source.py $source_name"
            done
            echo ""
            echo "Then add the generated files to your commit:"
            echo "  git add ${SOURCES_DIR}/**/_generated_*.py"
            echo "  git commit --amend --no-edit"
            echo "  git push --force-with-lease"
            exit 1
          fi

