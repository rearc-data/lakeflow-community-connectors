name: Configure JFrog PyPI proxy
description: |
  Exchange the GitHub OIDC token for a JFrog Artifactory access token and
  point pip (or uv) at the Databricks JFrog PyPI proxy. Direct egress to
  pypi.org is blocked from the protected runner group; this proxy is the
  only supported path. See go/hardened-gha "Remote registry access for
  Github Actions".

  Requires the calling workflow to grant `id-token: write` and to have run
  actions/checkout in the same job.

inputs:
  index_var:
    description: Env var to set with the proxy URL (PIP_INDEX_URL for pip, UV_INDEX_URL for uv).
    required: false
    default: PIP_INDEX_URL

runs:
  using: composite
  steps:
    - name: Get JFrog OIDC token
      shell: bash
      run: |
        set -euo pipefail

        ID_TOKEN=$(curl -sLS \
          -H "User-Agent: actions/oidc-client" \
          -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
          "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=jfrog-github" | jq .value | tr -d '"')
        echo "::add-mask::${ID_TOKEN}"

        ACCESS_TOKEN=$(curl -sLS -XPOST -H "Content-Type: application/json" \
          "https://databricks.jfrog.io/access/api/v1/oidc/token" \
          -d "{\"grant_type\": \"urn:ietf:params:oauth:grant-type:token-exchange\", \"subject_token_type\":\"urn:ietf:params:oauth:token-type:id_token\", \"subject_token\": \"${ID_TOKEN}\", \"provider_name\": \"github-actions\"}" | jq .access_token | tr -d '"')
        echo "::add-mask::${ACCESS_TOKEN}"

        if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" = "null" ]; then
          echo "::error title=JFrog auth failed::Could not extract JFrog access token"
          exit 1
        fi

        echo "JFROG_ACCESS_TOKEN=${ACCESS_TOKEN}" >> "$GITHUB_ENV"

    - name: Configure ${{ inputs.index_var }}
      shell: bash
      env:
        INDEX_VAR: ${{ inputs.index_var }}
      run: |
        set -euo pipefail
        echo "${INDEX_VAR}=https://gha-service-account:${JFROG_ACCESS_TOKEN}@databricks.jfrog.io/artifactory/api/pypi/db-pypi/simple" >> "$GITHUB_ENV"
