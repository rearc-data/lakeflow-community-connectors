# Qualtrics REST API.
#
# Response shape across all paginated endpoints:
#   {"result": {"elements": [...], "nextPage": null|<url-with-skipToken>}}
# We always emit nextPage: null so the connector stops after one page.

endpoints:
  - path: "/API/v3/surveys"
    method: GET
    corpus: surveys
    response:
      pagination_style: none
      wrapper:
        records_key: result.elements
        extras:
          nextPage: null

  - path: "/API/v3/distributions"
    method: GET
    corpus: distributions
    response:
      pagination_style: none
      wrapper:
        records_key: result.elements
        extras:
          nextPage: null

  - path: "/API/v3/directories"
    method: GET
    corpus: directories
    response:
      pagination_style: none
      wrapper:
        records_key: result.elements
        extras:
          nextPage: null

  - path: "/API/v3/users"
    method: GET
    corpus: users
    response:
      pagination_style: none
      wrapper:
        records_key: result.elements
        extras:
          nextPage: null

  - path: "/API/v3/directories/{directory_id}/mailinglists"
    method: GET
    corpus: mailing_lists
    response:
      pagination_style: none
      wrapper:
        records_key: result.elements
        extras:
          nextPage: null

  - path: "/API/v3/directories/{directory_id}/contacts"
    method: GET
    corpus: directory_contacts
    response:
      pagination_style: none
      wrapper:
        records_key: result.elements
        extras:
          nextPage: null

  - path: "/API/v3/directories/{directory_id}/mailinglists/{mailing_list_id}/contacts"
    method: GET
    corpus: mailing_list_contacts
    response:
      pagination_style: none
      wrapper:
        records_key: result.elements
        extras:
          nextPage: null

  # /API/v3/survey-definitions/{id} — single-entity per survey.
  # Returns ``{"result": {}}`` so connector falls into "no definition" path.
  - path: "/API/v3/survey-definitions/{survey_id}"
    method: GET
    corpus: empty_survey_definition
    response:
      single_entity: true
      pagination_style: none

  # ---- survey_responses async export flow ----
  # Three steps: POST to start export → GET to poll progress → GET file.
  - path: "/API/v3/surveys/{survey_id}/export-responses"
    method: POST
    corpus: export_progress
    response:
      single_entity: true
      pagination_style: none

  - path: "/API/v3/surveys/{survey_id}/export-responses/{progress_id}"
    method: GET
    corpus: export_complete
    response:
      single_entity: true
      pagination_style: none

  # File download — returns a real (empty) ZIP via custom handler.
  - path: "/API/v3/surveys/{survey_id}/export-responses/{file_id}/file"
    method: GET
    handler: databricks.labs.community_connector.source_simulator.specs.qualtrics.handlers.export_zip:serve_zip
