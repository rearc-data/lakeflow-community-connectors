# SurveyMonkey API v3.
#
# Standard wrapped responses: {"data": [...], "links": {"next": null}, ...}.
# We emit links.next null so the connector stops pagination after one page.

endpoints:
  # Single-entity endpoints — return the corpus dict directly.
  - path: /v3/users/me
    method: GET
    corpus: users
    response:
      single_entity: true
      pagination_style: none

  - path: /v3/surveys/{survey_id}/details
    method: GET
    corpus: surveys
    response:
      single_entity: true
      pagination_style: none

  # Listing endpoints with the standard SurveyMonkey envelope.
  - path: /v3/surveys
    method: GET
    corpus: surveys
    response:
      pagination_style: none
      wrapper:
        records_key: data
        extras:
          links: {}
          per_page: 50
          total: 0
          page: 1

  - path: /v3/surveys/{survey_id}/responses/bulk
    method: GET
    corpus: survey_responses
    response:
      pagination_style: none
      wrapper:
        records_key: data
        extras:
          links: {}
          per_page: 50
          total: 0
          page: 1

  - path: /v3/surveys/{survey_id}/collectors
