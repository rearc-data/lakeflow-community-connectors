          total: 0
          page: 1

  - path: /v3/contacts
    method: GET
    corpus: contacts
    response:
      pagination_style: none
      wrapper:
        records_key: data
        extras:
          links: {}
          per_page: 50
          total: 0
          page: 1

  # Tables we may not have generated spec entries for; follow the same pattern.
  - path: /v3/survey_pages
    method: GET
    corpus: survey_pages
    response: {pagination_style: none, wrapper: {records_key: data, extras: {links: {}, page: 1}}}
  - path: /v3/survey_questions
