# OSIsoft PI Web API.
#
# All responses use the standard ``{"Items": [...]}`` wrapper. We return
# empty Items for everything — the connector terminates immediately on
# empty parents, so drill-down loops don't fire and per-stream endpoints
# never get hit.

endpoints:
  - path: /piwebapi/dataservers
    method: GET
    corpus: empty_items
    response: {pagination_style: none, single_entity: true}

  - path: /piwebapi/dataservers/{webid}/points
    method: GET
    corpus: empty_items
    response: {pagination_style: none, single_entity: true}

  - path: /piwebapi/points/{webid}/attributes
    method: GET
    corpus: empty_items
    response: {pagination_style: none, single_entity: true}

  - path: /piwebapi/streamsets/recorded
    method: GET
    corpus: empty_items
    response: {pagination_style: none, single_entity: true}

  - path: /piwebapi/streamsets/interpolated
    method: GET
    corpus: empty_items
    response: {pagination_style: none, single_entity: true}

